    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var collapse = document.querySelector(".collapse");
        var align = document.querySelector(".align");
        var label = collapse.querySelector(".box p");

        if (!collapse || !align) return;

        collapse.addEventListener("click", function (e) {
          e.preventDefault();

          align.classList.toggle("expanded");
          var expanded = align.classList.contains("expanded");

          collapse.setAttribute("aria-expanded", expanded);
          label.textContent = expanded ? "close" : "open";
        });
      });
    </script>

        theme: "monokai",
        multipleBuffers: true,
        watchHash: true,
        fileDrops: true,
        });
